name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build-test:
    name: Build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          # Node 24 ships npm 11, matching the npm that generates package-lock.json.
          # Older npm (Node 20 = npm 10) records platform-specific optional deps
          # differently and fails `npm ci` with spurious "missing from lock file".
          node-version: 24
          cache: npm

      - name: Install dependencies
        # `npm install`, not `npm ci`: deep optional wasm deps (@emnapi/*) float
        # by range and re-resolve to different patch versions across machines,
        # which makes `npm ci` hard-fail with spurious "missing from lock file".
        # install reconciles the lock instead of erroring; versions stay pinned
        # by package.json ranges + the committed lock as a starting point.
        run: npm install --no-audit --no-fund

      - name: Type-check
        run: npm run type-check

      - name: Build
        run: npm run build

      - name: JS unit tests
        run: npm run test:unit

      - name: Lint JS
        run: npm run lint:js

      - name: Lint styles
        run: npm run lint:css

  php:
    name: PHP lint & tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          # 7.4 is the plugin's minimum supported PHP; PHPUnit 9 is the newest
          # line that still runs on it and matches tests/php/Bip21Test.php.
          php-version: '7.4'
          tools: phpunit:9

      - name: PHP syntax check
        run: |
          find . -path ./node_modules -prune -o -name '*.php' -print \
            | xargs -n1 -P4 php -l

      - name: BIP21 PHP unit tests
        # The test file self-bootstraps (defines CHAINKIT_BPB_TESTING, then
        # includes includes/bip21.php), so no --bootstrap flag is needed.
        run: phpunit tests/php/Bip21Test.php
